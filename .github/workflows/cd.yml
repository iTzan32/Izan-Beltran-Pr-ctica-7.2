# =============================================================
# WORKFLOW DE DESPLIEGUE CONTINUO (CD)
# =============================================================
# Este workflow despliega la web en GitHub Pages automáticamente
# cuando se fusiona código en la rama principal.
# =============================================================

name: CD - Despliegue a GitHub Pages

# TODO 1: El evento es 'push' porque al fusionar un PR se "empuja" código a main.
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # TODO 2: Necesitamos permiso de escritura para crear la rama gh-pages.
      contents: write
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Desplegar en GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # TODO 3: El punto (.) representa el directorio raíz en Linux.
          publish_dir: .
          publish_branch: gh-pages